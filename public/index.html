<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sekhmet - Influencer Virtual</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

        /* Panel de chat flotante */
        .chat-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 320px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            color: white;
            z-index: 100;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .chat-header {
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px 15px 0 0;
            font-weight: bold;
            cursor: pointer;
        }

        .chat-messages {
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            font-size: 14px;
        }

        .message {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 10px;
            max-width: 85%;
        }

        .user-message {
            background: #667eea;
            margin-left: auto;
            text-align: right;
        }

        .bot-message {
            background: #2d3748;
            margin-right: auto;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #333;
        }

        .chat-input-area input {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            background: #2d3748;
            color: white;
        }

        .chat-input-area button {
            margin-left: 8px;
            padding: 8px 15px;
            background: #667eea;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        .chat-input-area button:hover {
            background: #764ba2;
        }

        /* Indicador de escritura */
        .typing {
            color: #aaa;
            font-style: italic;
            padding: 5px;
        }

        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">
        💬 Habla con Sekhmet | Escribe en el chat de la derecha
    </div>

    <div class="chat-panel">
        <div class="chat-header">
            🎤 Sekhmet - Influencer Virtual
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                👋 ¡Hola! Soy Sekhmet. ¿De qué quieres hablar hoy?
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Escribe algo..." onkeypress="if(event.key==='Enter') enviarMensaje()">
            <button onclick="enviarMensaje()">Enviar</button>
        </div>
    </div>

    <!-- Importación de módulos -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
                "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.4.0/lib/three-vrm.module.min.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';

        // --- Configuración 3D (igual que antes) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.2, 2.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.2, 0);
        controls.enableDamping = true;

        // Luces
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(1, 2, 1);
        scene.add(dirLight);
        const backLight = new THREE.DirectionalLight(0x88aaff, 0.5);
        backLight.position.set(-0.5, 1, -1);
        scene.add(backLight);

        // Cargar VRM
        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));

        const vrmUrl = 'https://raw.githubusercontent.com/rclaver/influencer/master/Sekhmet.vrm';
        let vrmModel;

        loader.load(vrmUrl, (gltf) => {
            vrmModel = gltf.userData.vrm;
            scene.add(vrmModel.scene);
            console.log('✅ Avatar cargado');
            if (vrmModel.lookAt) vrmModel.lookAt.target = camera;
        }, undefined, (error) => console.error('Error:', error));

        // Animación
        function animate() {
            requestAnimationFrame(animate);
            if (vrmModel && vrmModel.lookAt) vrmModel.lookAt.target = camera;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- FUNCIONES DEL CHAT (conectando al backend) ---
        window.enviarMensaje = async function() {
            const input = document.getElementById('userInput');
            const mensaje = input.value.trim();
            if (!mensaje) return;

            // Mostrar mensaje del usuario
            const chatDiv = document.getElementById('chatMessages');
            const userMsgDiv = document.createElement('div');
            userMsgDiv.className = 'message user-message';
            userMsgDiv.textContent = '👤 ' + mensaje;
            chatDiv.appendChild(userMsgDiv);

            // Limpiar input
            input.value = '';

            // Mostrar indicador de escritura
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing';
            typingDiv.textContent = 'Sekhmet está escribiendo...';
            chatDiv.appendChild(typingDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;

            try {
                // Llamar al backend
                const response = await fetch('http://localhost:3000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensajeUsuario: mensaje })
                });

                const data = await response.json();

                // Quitar indicador de escritura
                chatDiv.removeChild(typingDiv);

                // Mostrar respuesta
                const botMsgDiv = document.createElement('div');
                botMsgDiv.className = 'message bot-message';
                botMsgDiv.textContent = '🎤 ' + data.respuesta;
                chatDiv.appendChild(botMsgDiv);
                chatDiv.scrollTop = chatDiv.scrollHeight;

                // Aquí luego añadiremos sincronización de labios

            } catch (error) {
                console.error('Error al conectar con el servidor:', error);
                chatDiv.removeChild(typingDiv);
                const errorDiv = document.createElement('div');
                errorDiv.className = 'message bot-message';
                errorDiv.textContent = '⚠️ Error de conexión. ¿Has iniciado el servidor?';
                chatDiv.appendChild(errorDiv);
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sekhmet - Influencer Virtual</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

    /* Panel de chat flotante */
    .chat-panel {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 320px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      color: white;
      z-index: 100;
      font-family: monospace;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .chat-header {
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 15px 15px 0 0;
      font-weight: bold;
      cursor: pointer;
    }

    .chat-messages {
      height: 300px;
      overflow-y: auto;
      padding: 10px;
      font-size: 14px;
    }

    .message {
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 10px;
      max-width: 85%;
    }

    .user-message {
      background: #667eea;
      margin-left: auto;
      text-align: right;
    }

    .bot-message {
      background: #2d3748;
      margin-right: auto;
    }

    .chat-input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid #333;
    }

    .chat-input-area input {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 5px;
      background: #2d3748;
      color: white;
    }

    .chat-input-area button {
      margin-left: 8px;
      padding: 8px 15px;
      background: #667eea;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    .chat-input-area button:hover {
      background: #764ba2;
    }

    /* Indicador de escritura */
    .typing {
      color: #aaa;
      font-style: italic;
      padding: 5px;
    }

    #info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="info">
    💬 Habla con Sekhmet | Escribe en el chat de la derecha
  </div>

  <div class="chat-panel">
    <div class="chat-header">
      🎤 Sekhmet - Influencer Virtual
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="message bot-message">
        👋 ¡Hola! Soy Sekhmet. ¿De qué quieres hablar hoy?
      </div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="userInput" placeholder="Escribe algo..." onkeypress="if(event.key==='Enter') enviarMensaje()">
      <button onclick="enviarMensaje()">Enviar</button>
    </div>
  </div>

  <!-- Importación de módulos -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.4.0/lib/three-vrm.module.min.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { VRMLoaderPlugin } from '@pixiv/three-vrm';

    // ============================================
    // SISTEMA DE GESTOS PARA SEKHMET
    // ============================================
    let gestureInterval;
    let currentGesture = null;
    let gestureAnimationId = null;
    let posturaNaturalAplicada = false;

    function listarHuesosDisponibles(vrm) {
       console.log("=== HUESOS DISPONIBLES EN TU VRM ===");
       if (!vrm || !vrm.humanoid) {
           console.error("No se pudo acceder a humanoid");
           return;
       }
       const humanoidBones = vrm.humanoid.humanBones;
       for (let boneType in humanoidBones) {
           const bone = humanoidBones[boneType];
           if (bone && bone.node) {
               console.log(`- ${boneType}: ${bone.node.name}`);
           }
       }
       console.log("====================================");
    }
    // === Huesos disponibles en el VRM ===
    // hips: J_Bip_C_Hips
    // spine: J_Bip_C_Spine
    // chest: J_Bip_C_Chest
    // upperChest: J_Bip_C_UpperChest

    // rightUpperLeg: J_Bip_R_UpperLeg
    // rightLowerLeg: J_Bip_R_LowerLeg
    // rightFoot: J_Bip_R_Foot
    // rightToes: J_Bip_R_ToeBase
    // leftShoulder: J_Bip_L_Shoulder
    // leftUpperArm: J_Bip_L_UpperArm

    // leftHand: J_Bip_L_Hand
    // rightShoulder: J_Bip_R_Shoulder

    // leftLittleDistal: J_Bip_L_Little3
    // rightThumbMetacarpal: J_Bip_R_Thumb1

    // rightIndexProximal: J_Bip_R_Index1

    // rightIndexDistal: J_Bip_R_Index3

    // rightRingIntermediate: J_Bip_R_Ring2
    // rightRingDistal: J_Bip_R_Ring3
    // rightLittleProximal: J_Bip_R_Little1
    // rightLittleIntermediate: J_Bip_R_Little2
    // rightLittleDistal: J_Bip_R_Little3

    // Mapeo de nombres de huesos (formato estándar de tu VRM)
    const HUESOS = {
        'spine': 'spine',
        'chest': 'chest',
        'upperChest': 'upperChest',
        'neck': 'neck',
        'head': 'head',
        'rightShoulder': 'rightShoulder',
        'rightUpperArm': 'rightUpperArm',
        'rightLowerArm': 'rightLowerArm',
        'rightHand': 'rightHand',
        'leftShoulder': 'leftShoulder',
        'leftUpperArm': 'leftUpperArm',
        'leftLowerArm': 'leftLowerArm',
        'leftHand': 'leftHand'
    };

    // Obtener hueso por nombre estandarizado
    function getBone(vrm, nombreEstandar) {
        if (!vrm || !vrm.humanoid) return null;

        const boneName = HUESOS[nombreEstandar];
        if (!boneName) return null;

        try {
            const bone = vrm.humanoid.getRawBoneFromNode(boneName);
            if (bone) return bone;
        } catch(e) {
            // Intentar búsqueda directa en la escena
            const searchBone = (obj) => {
                if (obj.isBone && obj.name.toLowerCase().includes(boneName.toLowerCase())) {
                    return obj;
                }
                for (let child of obj.children || []) {
                    const result = searchBone(child);
                    if (result) return result;
                }
                return null;
            };
            return searchBone(vrm.scene);
        }
        return null;
    }

    // Función para buscar hueso por nombre exacto o parcial
    function findBoneByName(vrm, nombreBuscado) {
        if (!vrm || !vrm.scene) return null;

        // Búsqueda recursiva en toda la escena
        function search(obj) {
            if (obj.isBone && obj.name) {
                // Comparación exacta o que contenga (ignorando mayúsculas)
                if (obj.name === nombreBuscado ||
                    obj.name.toLowerCase().includes(nombreBuscado.toLowerCase())) {
                    //console.log(`✅ Hueso encontrado: ${obj.name}`);
                    return obj;
                }
            }
            if (obj.children) {
                for (let child of obj.children) {
                    const found = search(child);
                    if (found) return found;
                }
            }
            return null;
        }

        return search(vrm.scene);
    }

    // Aplicar postura natural (brazos ligeramente hacia adelante, no en cruz)
    function aplicarPosturaNatural(vrm) {
        if (posturaNaturalAplicada) return;

        console.log("🔧 Aplicando postura natural...");
        const rightUpperArm = findBoneByName(vrm, "J_Bip_R_UpperArm");
        const leftUpperArm = findBoneByName(vrm, "J_Bip_L_UpperArm");
        const rightLowerArm = findBoneByName(vrm, "J_Bip_R_LowerArm");
        const leftLowerArm = findBoneByName(vrm, "J_Bip_L_LowerArm");
        const rightShoulder = findBoneByName(vrm, "J_Bip_R_Shoulder");
        const leftShoulder = findBoneByName(vrm, "J_Bip_L_Shoulder");

        console.log("Huesos encontrados:", {
            rightUpperArm: !!rightUpperArm,
            leftUpperArm: !!leftUpperArm,
            rightLowerArm: !!rightLowerArm,
            leftLowerArm: !!leftLowerArm
        });

        // Para VRM en pose T, necesitamos rotar los hombros y brazos
        if (rightShoulder) {
            rightShoulder.rotation.z = 0.3;
            rightShoulder.rotation.x = -0.2;
            console.log("✓ Rotación hombro derecho aplicada");
        }

        if (leftShoulder) {
            leftShoulder.rotation.z = -0.3;
            leftShoulder.rotation.x = 0.2;
            console.log("✓ Rotación hombro izquierdo aplicada");
        }

        if (rightUpperArm) {
            // Rotación más pronunciada para salir de pose T
            rightUpperArm.rotation.z = 0.7;  // Bajar el brazo
            rightUpperArm.rotation.x = -0.3;   // Ligeramente hacia adelante
            console.log("✓ Rotación brazo derecho aplicada");
        }

        if (leftUpperArm) {
            leftUpperArm.rotation.z = -0.7;
            leftUpperArm.rotation.x = 0.3;
            console.log("✓ Rotación brazo izquierdo aplicada");
        }

        if (rightLowerArm) {
            rightLowerArm.rotation.x = -0.4;  // Flexionar codo
            console.log("✓ Rotación antebrazo derecho aplicada");
        }

        if (leftLowerArm) {
            leftLowerArm.rotation.x = -0.4;
            console.log("✓ Rotación antebrazo izquierdo aplicada");
        }

        posturaNaturalAplicada = true;

        // Forzar actualización
        if (vrm.scene) {
            vrm.scene.updateMatrixWorld(true);
        }

        console.log("✅ Postura natural aplicada.");
    }
    // Función de interpolación suave (ease in-out)
    function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    // Gesto con interpolación suave
    function ejecutarGestoSuave(vrm, nombreGesto) {
        if (!vrm || currentGesture) return;

        const gestos = {
            'saludo': {
                duracion: 800,
                animacion: (progress) => {
                    const rightArm = findBoneByName(vrm, "J_Bip_R_UpperArm");
                    if (rightArm) {
                        const angulo = Math.sin(progress * Math.PI) * 0.8;
                        rightArm.rotation.z = -0.6 + angulo * 0.5;
                        rightArm.rotation.x = 0.3 + angulo * 0.3;
                    }
                },
                reset: () => {
                    const rightArm = findBoneByName(vrm, "J_Bip_R_UpperArm");
                    if (rightArm) {
                        rightArm.rotation.z = -0.6;
                        rightArm.rotation.x = 0.3;
                    }
                }
            },
            'afirmacion': {
                duracion: 500,
                animacion: (progress) => {
                    const head = findBoneByName(vrm, "J_Bip_C_Head");
                    if (head) {
                        const angulo = Math.sin(progress * Math.PI) * 0.25;
                        head.rotation.x = -angulo;
                    }
                },
                reset: () => {
                    const head = findBoneByName(vrm, "J_Bip_C_Head");
                    if (head) head.rotation.x = 0;
                }
            },
            'negacion': {
                duracion: 600,
                animacion: (progress) => {
                    const head = findBoneByName(vrm, "J_Bip_C_Head");
                    if (head) {
                        const angulo = Math.sin(progress * Math.PI * 2) * 0.3;
                        head.rotation.y = angulo;
                    }
                },
                reset: () => {
                    const head = findBoneByName(vrm, "J_Bip_C_Head");
                    if (head) head.rotation.y = 0;
                }
            },
            'animada': {
                duracion: 1000,
                animacion: (progress) => {
                    const rightArm = findBoneByName(vrm, "J_Bip_R_UpperArm");
                    const leftArm = findBoneByName(vrm, "J_Bip_L_UpperArm");
                    const spine = findBoneByName(vrm, "J_Bip_C_Spine");

                    const smooth = Math.sin(progress * Math.PI * 2);
                    if (rightArm) {
                        rightArm.rotation.z = -0.6 + smooth * 0.2;
                        rightArm.rotation.x = 0.3 + smooth * 0.15;
                    }
                    if (leftArm) {
                        leftArm.rotation.z = 0.6 - smooth * 0.2;
                        leftArm.rotation.x = 0.3 + smooth * 0.15;
                    }
                    if (spine) {
                        spine.rotation.x = smooth * 0.05;
                    }
                },
                reset: () => {
                    const rightArm = findBoneByName(vrm, "J_Bip_R_UpperArm");
                    const leftArm = findBoneByName(vrm, "J_Bip_L_UpperArm");
                    const spine = findBoneByName(vrm, "J_Bip_C_Spine");
                    if (rightArm) { rightArm.rotation.z = -0.6; rightArm.rotation.x = 0.3; }
                    if (leftArm) { leftArm.rotation.z = 0.6; leftArm.rotation.x = 0.3; }
                    if (spine) spine.rotation.x = 0;
                }
            }
        };

        const gesto = gestos[nombreGesto];
        if (!gesto) return;

        currentGesture = { nombre: nombreGesto };
        const startTime = performance.now();

        function animar(now) {
            const elapsed = now - startTime;
            let progress = Math.min(1, elapsed / gesto.duracion);

            // Ease out para suavidad
            const easeProgress = 1 - Math.pow(1 - progress, 2);

            if (progress >= 1) {
                gesto.reset();
                currentGesture = null;
                gestureAnimationId = null;
                return;
            }

            gesto.animacion(easeProgress);
            gestureAnimationId = requestAnimationFrame(animar);
        }

        if (gestureAnimationId) cancelAnimationFrame(gestureAnimationId);
        gestureAnimationId = requestAnimationFrame(animar);
    }

    // Versión simple de gestos aleatorios
    function iniciarGestosSuaves(vrm) {
        if (gestureInterval) clearInterval(gestureInterval);

        // Listar huesos para debug (solo una vez)
        setTimeout(() => listarHuesosDisponibles(vrm), 1000);

        // Aplicar postura natural al cargar
        setTimeout(() => aplicarPosturaNatural(vrm), 1000);

        gestureInterval = setInterval(() => {
            if (!vrm || currentGesture) return;

            const gestosPosibles = ['afirmacion', 'negacion', 'animada'];
            const random = Math.random();

            if (random < 0.2) {
                ejecutarGestoSuave(vrm, 'saludo');
            } else if (random < 0.4) {
                ejecutarGestoSuave(vrm, 'enfado');
            } else {
                const gesto = gestosPosibles[Math.floor(Math.random() * gestosPosibles.length)];
                ejecutarGestoSuave(vrm, gesto);
            }
        }, 15000); // Cada 15 segundos
    }

    // Integrar con las respuestas de Sekhmet
    function gestualizarRespuesta(texto, vrm) {
        console.log('gestualizarRespuesta',texto)
        if (!vrm) return;

        const t = texto.toLowerCase();

       if (t.includes('hola') || t.includes('saludo') || t.includes('buenos días')) {
           ejecutarGestoSuave(vrm, 'saludo');
       }
       else if (t.includes('no') || t.includes('nunca')) {
           ejecutarGestoSuave(vrm, 'negacion');
       }
       else if (t.includes('sí') || t.includes('claro') || t.includes('a por todas')) {
           ejecutarGestoSuave(vrm, 'afirmacion');
       }
       else if (t.includes('machismo') || t.includes('consumismo') || t.includes('moda') || t.includes('engañar')) {
           ejecutarGestoSuave(vrm, 'enfado');
       }
       else if (t.includes('compañera') || t.includes('organizar') || t.includes('gente')) {
           ejecutarGestoSuave(vrm, 'animada');
       }
    }

    // Gestos usando rotaciones relativas (más suaves)
    const GESTOS = {
       'saludo': {
           duracion: 800,
           secuencia: [
             { bones: ['rightUpperArm', 'J_Bip_R_UpperArm', 'rightArm', 'arm', 'rightShoulder'], rotation: { x: 0, y: -0.5, z: 0.3 }, tiempo: 0 },
             { bones: ['rightLowerArm', 'J_Bip_R_LowerArm', 'rightForeArm', 'forearm'], rotation: { x: -0.5, y: 0, z: 0 }, tiempo: 100 },
             { bones: ['rightUpperArm', 'J_Bip_R_UpperArm', 'rightArm', 'arm', 'rightShoulder'], rotation: { x: 0, y: 0.5, z: -0.2 }, tiempo: 400 },
             { bones: ['rightUpperArm', 'J_Bip_R_UpperArm', 'rightArm', 'arm', 'rightShoulder'], rotation: { x: 0, y: 0, z: 0 }, tiempo: 800 },
             { bones: ['rightLowerArm', 'J_Bip_R_LowerArm', 'rightForeArm', 'forearm'], rotation: { x: 0, y: 0, z: 0 }, tiempo: 800 }
           ]
       },
       'enfado': {
           duracion: 600,
           secuencia: [
             { bones: ['spine', 'chest'], rotation: { x: 0.1, y: 0, z: 0 }, tiempo: 0 },
             { bones: ['rightUpperArm', 'J_Bip_R_UpperArm', 'rightArm', 'arm'], rotation: { x: -0.6, y: 0.2, z: 0.1 }, tiempo: 0 },
             { bones: ['rightLowerArm', 'J_Bip_R_LowerArm', 'rightForeArm', 'forearm'], rotation: { x: -0.8, y: 0, z: 0 }, tiempo: 100 },
             { bones: ['spine', 'chest'], rotation: { x: 0, y: 0, z: 0 }, tiempo: 600 },
             { bones: ['rightUpperArm', 'J_Bip_R_UpperArm', 'rightArm', 'arm'], rotation: { x: 0, y: 0, z: 0 }, tiempo: 600 },
             { bones: ['rightLowerArm', 'J_Bip_R_LowerArm', 'rightForeArm', 'forearm'], rotation: { x: 0, y: 0, z: 0 }, tiempo: 600 }
           ]
       },
       'afirmacion': {
           duracion: 500,
           secuencia: [
             { bones: ['head', 'neck'], rotation: { x: -0.2, y: 0, z: 0 }, tiempo: 0 },
             { bones: ['head', 'neck'], rotation: { x: 0, y: 0, z: 0 }, tiempo: 300 }
           ]
       },
       'negacion': {
           duracion: 600,
           secuencia: [
             { bones: ['head', 'neck'], rotation: { x: 0, y: -0.3, z: 0 }, tiempo: 0 },
             { bones: ['head', 'neck'], rotation: { x: 0, y: 0.3, z: 0 }, tiempo: 200 },
             { bones: ['head', 'neck'], rotation: { x: 0, y: 0, z: 0 }, tiempo: 600 }
           ]
       },
       'animada': {
           duracion: 1000,
           secuencia: [
               { bones: ['spine', 'chest'], rotation: { x: 0.05, y: 0, z: 0.05 }, tiempo: 0 },
               { bones: ['rightUpperArm', 'J_Bip_R_UpperArm', 'rightArm'], rotation: { x: -0.3, y: 0.2, z: 0.1 }, tiempo: 0 },
               { bones: ['leftUpperArm', 'leftArm'], rotation: { x: -0.3, y: -0.2, z: -0.1 }, tiempo: 0 },
               { bones: ['spine', 'chest'], rotation: { x: -0.03, y: 0, z: -0.03 }, tiempo: 500 },
               { bones: ['spine', 'chest'], rotation: { x: 0, y: 0, z: 0 }, tiempo: 1000 },
               { bones: ['rightUpperArm', 'J_Bip_R_UpperArm', 'rightArm'], rotation: { x: 0, y: 0, z: 0 }, tiempo: 1000 },
               { bones: ['leftUpperArm', 'leftArm'], rotation: { x: 0, y: 0, z: 0 }, tiempo: 1000 }
           ]
       }
    };

    // Ejecutar un gesto específico
    function ejecutarGesto(vrm, nombreGesto) {
       if (!vrm || !GESTOS[nombreGesto]) return;

       const gesto = GESTOS[nombreGesto];
       currentGesture = { nombre: nombreGesto, inicio: Date.now(), duracion: gesto.duracion };

       // Guardar rotaciones originales de los huesos
       const rotacionesOriginales = new Map();

       // Ejecutar la secuencia del gesto
       const startTime = Date.now();

       const intervalId = setInterval(() => {
           const elapsed = Date.now() - startTime;

           if (elapsed >= gesto.duracion) {
               // Restaurar todas las rotaciones a 0
               rotacionesOriginales.forEach((rot, bone) => {
                  if (bone && bone.rotation) {
                     bone.rotation.x = rot.x;
                     bone.rotation.y = rot.y;
                     bone.rotation.z = rot.z;
                  }
               });
               clearInterval(intervalId);
               currentGesture = null;
               return;
           }

           // Aplicar rotaciones según el tiempo
           for (let step of gesto.secuencia) {
               if (elapsed >= step.tiempo) {
                   const boneNames = Array.isArray(step.bones) ? step.bones : [step.bones];
                   for (let boneName of boneNames) {
                      const bone = getBone(vrm, boneName);
                      if (bone) {
                         // Guardar original si no se ha guardado
                         if (!rotacionesOriginales.has(bone)) {
                            rotacionesOriginales.set(bone, {
                               x: bone.rotation.x,
                               y: bone.rotation.y,
                               z: bone.rotation.z
                            });
                         }
                         // Aplicar nueva rotación
                         bone.rotation.x = step.rotation.x;
                         bone.rotation.y = step.rotation.y;
                         bone.rotation.z = step.rotation.z;
                      }
                   }
               }
           }
       }, 16); // ~60fps
    }

    // Gestos aleatorios cada 8-15 segundos
    function iniciarGestosAleatorios(vrm) {
       if (gestureInterval) clearInterval(gestureInterval);

       gestureInterval = setInterval(() => {
           if (!vrm || currentGesture) return;

           const gestosDisponibles = ['saludo', 'afirmacion', 'negacion'];
           // A veces enfado (30% de probabilidad si está sola)
           if (Math.random() < 0.3 && !window.userSpeaking) {
               gestosDisponibles.push('enfado');
           }

           const gestoAleatorio = gestosDisponibles[Math.floor(Math.random() * gestosDisponibles.length)];
           ejecutarGesto(vrm, gestoAleatorio);

       }, 10000); // Cada 10 segundos
    }

    // --- Configuración 3D ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.2, 2.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.2, 0);
    controls.enableDamping = true;

    // Luces
    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(1, 2, 1);
    scene.add(dirLight);
    const backLight = new THREE.DirectionalLight(0x88aaff, 0.5);
    backLight.position.set(-0.5, 1, -1);
    scene.add(backLight);

    // Cargar VRM
    const loader = new GLTFLoader();
    loader.register((parser) => new VRMLoaderPlugin(parser));

    const vrmUrl = 'https://raw.githubusercontent.com/rclaver/influencer/master/Sekhmet.vrm';
    let vrmModel;

    loader.load(vrmUrl, (gltf) => {
      vrmModel = gltf.userData.vrm;
      scene.add(vrmModel.scene);
      console.log('✅ Avatar cargado');

      iniciarGestosSuaves(vrmModel);

      if (vrmModel.lookAt) vrmModel.lookAt.target = camera;
    }, undefined, (error) => console.error('Error:', error));

    // Animación
    function animate() {
      requestAnimationFrame(animate);
      if (vrmModel && vrmModel.lookAt) vrmModel.lookAt.target = camera;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- FUNCIONES DEL CHAT (conectando al backend) ---
    window.enviarMensaje = async function() {
      const input = document.getElementById('userInput');
      const mensaje = input.value.trim();
      if (!mensaje) return;

      window.userSpeaking = true;

      // Mostrar mensaje del usuario
      const chatDiv = document.getElementById('chatMessages');
      const userMsgDiv = document.createElement('div');
      userMsgDiv.className = 'message user-message';
      userMsgDiv.textContent = '👤 ' + mensaje;
      chatDiv.appendChild(userMsgDiv);

      input.value = '';

      // Mostrar indicador de escritura
      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing';
      typingDiv.textContent = 'Sekhmet está escribiendo...';
      chatDiv.appendChild(typingDiv);
      chatDiv.scrollTop = chatDiv.scrollHeight;

      try {
        // Llamar al backend
        const response = await fetch('http://localhost:3000/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mensajeUsuario: mensaje })
        });

        const data = await response.json();

        // Quitar indicador de escritura
        chatDiv.removeChild(typingDiv);

        // Mostrar respuesta
        const botMsgDiv = document.createElement('div');
        botMsgDiv.className = 'message bot-message';
        botMsgDiv.textContent = '🎤 ' + data.respuesta;
        chatDiv.appendChild(botMsgDiv);
        chatDiv.scrollTop = chatDiv.scrollHeight;

        // 🎭 **Añadir GESTO según RESPUESTA**
        if (vrmModel) {
          gestualizarRespuesta(data.respuesta, vrmModel);
        }
        window.userSpeaking = false;
        //if (vrmModel) {
        //  iniciarGestosAleatorios(vrmModel)
        //}

      } catch (error) {
         console.error('Error al conectar con el servidor:', error);
         chatDiv.removeChild(typingDiv);
         const errorDiv = document.createElement('div');
         errorDiv.className = 'message bot-message';
         errorDiv.textContent = '⚠️ Error de conexión. ¿Has iniciado el servidor?';
         chatDiv.appendChild(errorDiv);
         window.userSpeaking = false;
      }
    };
  </script>
</body>
</html>
